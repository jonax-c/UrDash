generate_card:
  name: Generate UrDash v2 card
  description: Generate one AI-designed UrDash v2 Lovelace custom card from selected Home Assistant entities.
  fields:
    request:
      name: Request
      description: Natural-language description of the card to create.
      required: true
      selector:
        text:
          multiline: true
    theme:
      name: Theme
      description: Preferred UrDash v2 visual theme.
      required: false
      default: aurora
      selector:
        select:
          options:
            - aurora
            - quiet
            - graphite
            - calm
            - sunrise
    height_mode:
      name: Height mode
      description: How the card should size inside Lovelace.
      required: false
      default: auto
      selector:
        select:
          options:
            - auto
            - viewport
            - fixed
    entity_ids:
      name: Entity IDs
      description: Optional list of entities that UrDash may use. Leave empty to allow all entities.
      required: false
      selector:
        entity:
          multiple: true
