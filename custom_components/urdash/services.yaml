generate_dashboard:
  name: Generate dashboard
  description: Generate a Lovelace dashboard draft from the current Home Assistant entities.
  fields:
    request:
      name: Request
      description: Natural-language description of the dashboard to create.
      required: true
      selector:
        text:
          multiline: true
    style:
      name: Style
      description: Visual style for the generated dashboard.
      required: false
      default: modern
      selector:
        select:
          options:
            - modern
            - minimal
            - glass
            - compact
    allow_custom_cards:
      name: Allow custom cards
      description: Use recommended HACS/Lovelace custom cards when generating YAML.
      required: false
      default: true
      selector:
        boolean:
    mode:
      name: Generation mode
      description: Generate a full Lovelace dashboard, a new Lovelace tab/view, or a native UrDash custom dashboard.
      required: false
      default: dashboard
      selector:
        select:
          options:
            - dashboard
            - new_view
            - custom_dashboard
    reference_dashboard:
      name: Reference dashboard YAML
      description: Existing dashboard YAML used as style/context only. UrDash does not modify it.
      required: false
      selector:
        text:
          multiline: true
    entity_ids:
      name: Entity IDs
      description: Optional list of entities that UrDash may use. Leave empty to allow all entities.
      required: false
      selector:
        entity:
          multiple: true
