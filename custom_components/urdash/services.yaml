generate_dashboard:
  name: Generate dashboard
  description: Generate a Lovelace dashboard draft from the current Home Assistant entities.
  fields:
    request:
      name: Request
      description: Natural-language description of the dashboard to create.
      required: true
      selector:
        text:
          multiline: true
    style:
      name: Style
      description: Visual style for the generated dashboard.
      required: false
      default: modern
      selector:
        select:
          options:
            - modern
            - minimal
            - glass
            - compact
    allow_custom_cards:
      name: Allow custom cards
      description: Use recommended HACS/Lovelace custom cards when generating YAML.
      required: false
      default: true
      selector:
        boolean:
    use_ai:
      name: Use AI
      description: Use the configured AI provider. Falls back to the local generator if unavailable.
      required: false
      default: true
      selector:
        boolean:
    mode:
      name: Generation mode
      description: Generate a full dashboard or a new tab/view that can be appended to an existing dashboard.
      required: false
      default: dashboard
      selector:
        select:
          options:
            - dashboard
            - new_view
    reference_dashboard:
      name: Reference dashboard YAML
      description: Existing dashboard YAML used as style/context only. UrDash does not modify it.
      required: false
      selector:
        text:
          multiline: true
