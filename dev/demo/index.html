<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UrDash v2 Renderer Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #e9eeee;
        color: #162529;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.78), rgba(231,238,236,0.82)),
          #e9eeee;
      }

      header {
        max-width: 1440px;
        margin: 0 auto;
        padding: 28px 20px 18px;
      }

      header span {
        color: #177063;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 6px 0 8px;
        color: #132a2e;
        font-size: clamp(30px, 4vw, 52px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #5b6f72;
      }

      main {
        max-width: 1440px;
        display: grid;
        gap: 22px;
        margin: 0 auto;
        padding: 0 20px 32px;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .demo-grid > section {
        min-width: 0;
        display: grid;
        gap: 10px;
      }

      .demo-grid h2 {
        margin: 0;
        color: #20383c;
        font-size: 15px;
      }

      .wide {
        grid-column: 1 / -1;
      }

      ha-icon {
        display: inline-grid;
        place-items: center;
        width: 1.2em;
        height: 1.2em;
      }

      @media (max-width: 900px) {
        .demo-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <span>UrDash v2 local demo</span>
      <h1>Renderer sample cards</h1>
      <p>Static page with mocked Home Assistant state. No Home Assistant instance is required.</p>
    </header>

    <main>
      <div class="demo-grid" id="cards"></div>
    </main>

    <script type="module">
      class DemoHaIcon extends HTMLElement {
        static get observedAttributes() {
          return ["icon"];
        }

        connectedCallback() {
          this.render();
        }

        attributeChangedCallback() {
          this.render();
        }

        render() {
          const icon = this.getAttribute("icon") || "mdi:circle";
          const label = icon.replace("mdi:", "").split("-").map((part) => part[0] || "").join("").slice(0, 2).toUpperCase();
          this.textContent = label || "IC";
          this.title = icon;
        }
      }

      if (!customElements.get("ha-icon")) {
        customElements.define("ha-icon", DemoHaIcon);
      }

      await import("../../custom_components/urdash/frontend/urdash-custom-card.js");

      const hass = {
        config: {
          unit_system: {
            temperature: "°C",
          },
        },
        states: {
          "sensor.living_room_temperature": state("sensor.living_room_temperature", "24", "Living Room Temperature", { unit_of_measurement: "°C", device_class: "temperature" }),
          "sensor.living_room_humidity": state("sensor.living_room_humidity", "57", "Living Room Humidity", { unit_of_measurement: "%", device_class: "humidity" }),
          "sensor.living_room_air_quality": state("sensor.living_room_air_quality", "Good", "Air Quality"),
          "light.living_room_main": state("light.living_room_main", "on", "Main Lights"),
          "light.living_room_lamp": state("light.living_room_lamp", "off", "Reading Lamp"),
          "climate.living_room_ac": state("climate.living_room_ac", "cool", "Living Room AC", {
            current_temperature: 24,
            temperature: 25,
            hvac_modes: ["cool", "dry", "fan_only", "off"],
          }),
          "cover.living_room_curtain": state("cover.living_room_curtain", "closed", "Curtain"),
          "binary_sensor.front_door": state("binary_sensor.front_door", "off", "Front Door"),
          "binary_sensor.hall_motion": state("binary_sensor.hall_motion", "off", "Hall Motion"),
          "binary_sensor.kitchen_window": state("binary_sensor.kitchen_window", "off", "Kitchen Window"),
          "binary_sensor.garage_motion": state("binary_sensor.garage_motion", "on", "Garage Motion"),
          "lock.front_door": state("lock.front_door", "locked", "Front Door Lock"),
          "lock.garage_entry": state("lock.garage_entry", "locked", "Garage Entry Lock"),
          "weather.home": state("weather.home", "partlycloudy", "Home Weather", { temperature: 27, temperature_unit: "°C", humidity: 63 }),
          "sensor.outdoor_humidity": state("sensor.outdoor_humidity", "63", "Outdoor Humidity", { unit_of_measurement: "%" }),
          "sensor.wind_speed": state("sensor.wind_speed", "12", "Wind Speed", { unit_of_measurement: "km/h" }),
          "sensor.uv_index": state("sensor.uv_index", "6", "UV Index"),
          "sensor.rain_probability": state("sensor.rain_probability", "18", "Rain Probability", { unit_of_measurement: "%" }),
          "sensor.home_power": state("sensor.home_power", "812", "Home Power", { unit_of_measurement: "W" }),
          "sensor.energy_today": state("sensor.energy_today", "9.4", "Energy Today", { unit_of_measurement: "kWh" }),
          "sensor.solar_power": state("sensor.solar_power", "426", "Solar Power", { unit_of_measurement: "W" }),
          "sensor.grid_import": state("sensor.grid_import", "386", "Grid Import", { unit_of_measurement: "W" }),
          "sensor.home_battery": state("sensor.home_battery", "78", "Home Battery", { unit_of_measurement: "%" }),
          "sensor.co2_living_room": state("sensor.co2_living_room", "612", "Living Room CO2", { unit_of_measurement: "ppm" }),
          "sensor.sleep_score": state("sensor.sleep_score", "86", "Sleep Score", { unit_of_measurement: "%" }),
          "sensor.air_purifier_filter": state("sensor.air_purifier_filter", "64", "Air Purifier Filter", { unit_of_measurement: "%" }),
          "fan.air_purifier": state("fan.air_purifier", "on", "Air Purifier"),
          "switch.washer": state("switch.washer", "on", "Washer"),
          "sensor.washer_remaining": state("sensor.washer_remaining", "24", "Washer Remaining", { unit_of_measurement: "min" }),
          "sensor.washer_power": state("sensor.washer_power", "342", "Washer Power", { unit_of_measurement: "W" }),
          "switch.irrigation_front": state("switch.irrigation_front", "off", "Front Irrigation"),
          "switch.irrigation_back": state("switch.irrigation_back", "on", "Back Irrigation"),
          "sensor.soil_moisture_front": state("sensor.soil_moisture_front", "42", "Front Soil Moisture", { unit_of_measurement: "%" }),
          "sensor.soil_moisture_back": state("sensor.soil_moisture_back", "68", "Back Soil Moisture", { unit_of_measurement: "%" }),
          "scene.living_room_movie": state("scene.living_room_movie", "scening", "Movie Mode"),
          "scene.home_goodnight": state("scene.home_goodnight", "scening", "Good Night"),
          "scene.home_focus": state("scene.home_focus", "scening", "Focus Mode"),
          "scene.home_morning": state("scene.home_morning", "scening", "Morning Mode"),
          "media_player.living_room": state("media_player.living_room", "playing", "Living Room Speaker", {
            media_title: "Midnight City",
            media_artist: "M83",
            volume_level: 0.34,
          }),
        },
        callService(domain, service, data) {
          console.log("mock callService", { domain, service, data });
        },
      };

      const samples = [
        {
          title: "Fancy Scene Composition",
          className: "wide",
          config: fancySceneCard(),
        },
        {
          title: "Room Control",
          className: "wide",
          config: roomControlCard(),
        },
        {
          title: "Weather Lens",
          config: weatherLensCard(),
        },
        {
          title: "Energy Cockpit",
          config: energyCockpitCard(),
        },
        {
          title: "Media Mood",
          config: mediaMoodCard(),
        },
        {
          title: "Spatial Security Map",
          config: spatialSecurityCard(),
        },
        {
          title: "Wellness Halo",
          config: wellnessHaloCard(),
        },
        {
          title: "Laundry Cockpit",
          config: laundryCockpitCard(),
        },
        {
          title: "Garden Flow",
          config: gardenFlowCard(),
        },
        {
          title: "Cinematic Weather",
          className: "wide",
          config: cinematicWeatherCard(),
        },
        {
          title: "Whole Home Command",
          className: "wide",
          config: wholeHomeCommandCard(),
        },
        {
          title: "Minimal Sensor Strip",
          config: minimalSensorStripCard(),
        },
        {
          title: "Quiet Climate",
          config: climateCard(),
        },
        {
          title: "Security Snapshot",
          config: securityCard(),
        },
        {
          title: "Weather And Energy",
          className: "wide",
          config: weatherEnergyCard(),
        },
      ];

      const host = document.querySelector("#cards");
      for (const sample of samples) {
        const section = document.createElement("section");
        if (sample.className) section.className = sample.className;
        const title = document.createElement("h2");
        title.textContent = sample.title;
        const card = document.createElement("urdash-card");
        card.setConfig(sample.config);
        card.hass = hass;
        section.append(title, card);
        host.appendChild(section);
      }

      function state(entityId, value, friendlyName, attributes = {}) {
        return {
          entity_id: entityId,
          state: value,
          attributes: {
            friendly_name: friendlyName,
            ...attributes,
          },
          last_changed: new Date(Date.now() - 1000 * 60 * 8).toISOString(),
          last_updated: new Date().toISOString(),
        };
      }

      function baseCard({ heightMode = "auto", intent, layout }) {
        return {
          type: "custom:urdash-card",
          urdash_schema: 2,
          height_mode: heightMode,
          card: { intent, layout },
        };
      }

      function fancySceneCard() {
        return baseCard({
          heightMode: "viewport",
          intent: {
            goal: "multi_device_control",
            title: "Evening Atmosphere",
            summary: "A spatial command surface with live comfort, room signals, and one-touch scenes.",
            risk_level: "medium",
            primary_entities: ["sensor.living_room_temperature", "light.living_room_main", "climate.living_room_ac"],
            primary_actions: ["scene.turn_on", "light.toggle", "climate.set_temperature"],
          },
          layout: {
            type: "canvas",
            aspect_ratio: "16/9",
            density: "spacious",
            theme: "aurora",
            blocks: [
              {
                id: "aura",
                kind: "ambient",
                title: "Living Room",
                subtitle: "spatial control layer",
                icon: "mdi:creation",
                frame: { x: 8, y: 6, w: 52, h: 74 },
                style: { accent: "#7f6df2" },
                presentation: { surface: "naked", layer: "backdrop", align: "center", scale: "xl" },
                animation: { preset: "breathe", trigger: "always", speed: "slow", intensity: "subtle" },
              },
              {
                id: "temperature_hero",
                kind: "hero_value",
                entity: "sensor.living_room_temperature",
                bind: { value: "state", unit: "attributes.unit_of_measurement" },
                label: "Current comfort",
                subtitle: "AC is holding a calm evening temperature",
                icon: "mdi:thermometer",
                frame: { x: 9, y: 18, w: 28, h: 32 },
                style: { accent: "#1f8a70", emphasis: "hero" },
                presentation: { surface: "naked", layer: "raised", align: "center", scale: "xl" },
              },
              {
                id: "orbit",
                kind: "entity_orbit",
                entity: "sensor.living_room_temperature",
                entities: [
                  "sensor.living_room_humidity",
                  "sensor.living_room_air_quality",
                  "light.living_room_main",
                  "light.living_room_lamp",
                  "cover.living_room_curtain",
                  "media_player.living_room",
                ],
                frame: { x: 38, y: 8, w: 34, h: 62 },
                style: { accent: "#d79a3f" },
                presentation: { surface: "ghost", layer: "raised", align: "center", scale: "normal" },
              },
              {
                id: "scenes",
                kind: "radial_scene",
                title: "Modes",
                subtitle: "tap a scene",
                icon: "mdi:palette",
                actions: [
                  { label: "Movie", entity_id: "scene.living_room_movie", icon: "mdi:movie-open" },
                  { label: "Night", entity_id: "scene.home_goodnight", icon: "mdi:weather-night" },
                ],
                frame: { x: 70, y: 14, w: 24, h: 50 },
                style: { accent: "#b76e79" },
                presentation: { surface: "glass", layer: "overlay", align: "center", scale: "normal" },
              },
              {
                id: "command_rail",
                kind: "button_group",
                title: "Quick actions",
                buttons: [
                  {
                    label: "Main lights",
                    icon: "mdi:lightbulb",
                    action: { type: "service", domain: "light", service: "toggle", entity_id: "light.living_room_main" },
                  },
                  {
                    label: "Lamp",
                    icon: "mdi:lamp",
                    action: { type: "service", domain: "light", service: "toggle", entity_id: "light.living_room_lamp" },
                  },
                  {
                    label: "Curtain",
                    icon: "mdi:window-shutter",
                    action: { type: "service", domain: "cover", service: "open_cover", entity_id: "cover.living_room_curtain" },
                  },
                ],
                frame: { x: 8, y: 72, w: 84, h: 18 },
                style: { accent: "#1f8a70" },
                presentation: { surface: "floating", layer: "overlay", align: "center", scale: "normal" },
              },
            ],
          },
        });
      }

      function roomControlCard() {
        return baseCard({
          intent: {
            goal: "room_control",
            title: "Living Room Command",
            summary: "Comfort, lights, covers, scenes, and key signals in one card.",
            risk_level: "medium",
            primary_entities: ["climate.living_room_ac", "light.living_room_main", "cover.living_room_curtain"],
            primary_actions: ["light.toggle", "climate.set_temperature", "cover.open_cover"],
          },
          layout: {
            type: "grid",
            columns: 12,
            density: "comfortable",
            theme: "aurora",
            blocks: [
              {
                id: "headline",
                kind: "text",
                text: "Living room is ready",
                subtitle: "Focused command surface",
                variant: "headline",
                grid: { col: 1, row: 1, w: 5, h: 2 },
                style: { emphasis: "hero", tone: "cool", accent: "#1f8a70" },
                animation: { preset: "fade_in", trigger: "on_load", speed: "normal", intensity: "subtle" },
              },
              {
                id: "comfort",
                kind: "value_cluster",
                title: "Comfort",
                icon: "mdi:thermometer",
                grid: { col: 6, row: 1, w: 4, h: 2 },
                items: [
                  { entity: "sensor.living_room_temperature", label: "Temp", value: "state" },
                  { entity: "sensor.living_room_humidity", label: "Humidity", value: "state" },
                  { entity: "sensor.living_room_air_quality", label: "Air", value: "state" },
                ],
                style: { accent: "#3f7cac" },
              },
              {
                id: "modes",
                kind: "scene_strip",
                title: "Scenes",
                icon: "mdi:palette",
                grid: { col: 10, row: 1, w: 3, h: 2 },
                actions: [
                  { label: "Movie", entity_id: "scene.living_room_movie" },
                  { label: "Night", entity_id: "scene.home_goodnight" },
                ],
                style: { accent: "#b76e79" },
              },
              {
                id: "climate",
                kind: "climate_control",
                title: "Climate",
                entity: "climate.living_room_ac",
                icon: "mdi:air-conditioner",
                grid: { col: 1, row: 3, w: 5, h: 3 },
                style: { accent: "#4f8fba", emphasis: "high" },
              },
              {
                id: "lights",
                kind: "toggle_group",
                title: "Lights",
                icon: "mdi:lightbulb-group",
                entities: ["light.living_room_main", "light.living_room_lamp"],
                grid: { col: 6, row: 3, w: 3, h: 2 },
                style: { accent: "#d79a3f" },
              },
              {
                id: "cover",
                kind: "cover_control",
                title: "Curtain",
                entity: "cover.living_room_curtain",
                icon: "mdi:window-shutter",
                grid: { col: 9, row: 3, w: 4, h: 2 },
                style: { accent: "#6f7d8c" },
              },
              {
                id: "timeline",
                kind: "timeline",
                title: "Recent signals",
                entities: ["light.living_room_main", "climate.living_room_ac", "cover.living_room_curtain", "media_player.living_room"],
                grid: { col: 6, row: 5, w: 7, h: 2 },
                style: { accent: "#1f8a70" },
              },
            ],
          },
        });
      }

      function weatherLensCard() {
        return baseCard({
          intent: {
            goal: "weather",
            title: "Weather Lens",
            summary: "Outdoor condition as a compact visual lens with supporting atmosphere signals.",
            risk_level: "low",
            primary_entities: ["weather.home", "sensor.wind_speed", "sensor.outdoor_humidity"],
            primary_actions: [],
          },
          layout: {
            type: "canvas",
            aspect_ratio: "4/5",
            density: "spacious",
            theme: "calm",
            blocks: [
              {
                id: "weather_aura",
                kind: "ambient",
                title: "Outside",
                subtitle: "partly cloudy",
                icon: "mdi:weather-partly-cloudy",
                frame: { x: 5, y: 4, w: 90, h: 62 },
                style: { accent: "#5c94b8" },
                presentation: { surface: "naked", layer: "backdrop", align: "center", scale: "xl" },
                animation: { preset: "float", trigger: "always", speed: "slow", intensity: "subtle" },
              },
              {
                id: "temp",
                kind: "hero_value",
                entity: "weather.home",
                bind: { value: "attributes.temperature" },
                label: "Outdoor",
                subtitle: "partly cloudy",
                icon: "mdi:weather-partly-cloudy",
                frame: { x: 12, y: 18, w: 76, h: 34 },
                style: { accent: "#5c94b8" },
                presentation: { surface: "naked", layer: "raised", align: "center", scale: "xl" },
              },
              {
                id: "weather_chips",
                kind: "chip_group",
                chips: [
                  { label: "Humidity", entity: "sensor.outdoor_humidity", icon: "mdi:water-percent" },
                  { label: "Wind", entity: "sensor.wind_speed", icon: "mdi:weather-windy" },
                ],
                frame: { x: 12, y: 66, w: 76, h: 16 },
                style: { accent: "#5c94b8" },
                presentation: { surface: "floating", layer: "overlay", align: "center", scale: "normal" },
              },
            ],
          },
        });
      }

      function energyCockpitCard() {
        return baseCard({
          intent: {
            goal: "energy",
            title: "Energy Cockpit",
            summary: "Power flow overview with load, solar, grid import, and battery reserve.",
            risk_level: "low",
            primary_entities: ["sensor.home_power", "sensor.solar_power", "sensor.home_battery"],
            primary_actions: [],
          },
          layout: {
            type: "canvas",
            aspect_ratio: "4/5",
            density: "comfortable",
            theme: "graphite",
            blocks: [
              {
                id: "power_core",
                kind: "entity_orbit",
                entity: "sensor.home_power",
                entities: ["sensor.solar_power", "sensor.grid_import", "sensor.energy_today", "sensor.home_battery"],
                frame: { x: 4, y: 6, w: 92, h: 58 },
                style: { accent: "#62b488" },
                presentation: { surface: "ghost", layer: "raised", align: "center", scale: "large" },
                animation: { preset: "glow", trigger: "always", speed: "slow", intensity: "subtle" },
              },
              {
                id: "battery",
                kind: "gauge",
                title: "Battery",
                entity: "sensor.home_battery",
                bind: { value: "state" },
                range: { min: 0, max: 100 },
                frame: { x: 10, y: 68, w: 36, h: 18 },
                style: { accent: "#62b488" },
                presentation: { surface: "rail", layer: "overlay", scale: "normal" },
              },
              {
                id: "import",
                kind: "value",
                label: "Grid import",
                entity: "sensor.grid_import",
                bind: { value: "state", unit: "attributes.unit_of_measurement" },
                frame: { x: 52, y: 68, w: 38, h: 18 },
                style: { accent: "#d9a441" },
                presentation: { surface: "rail", layer: "overlay", scale: "normal" },
              },
            ],
          },
        });
      }

      function mediaMoodCard() {
        return baseCard({
          intent: {
            goal: "media_control",
            title: "Media Mood",
            summary: "A living-room music card with scene shortcuts and playback control.",
            risk_level: "low",
            primary_entities: ["media_player.living_room", "scene.living_room_movie", "scene.home_goodnight"],
            primary_actions: ["media_player.media_play_pause", "scene.turn_on"],
          },
          layout: {
            type: "canvas",
            aspect_ratio: "4/5",
            density: "spacious",
            theme: "aurora",
            blocks: [
              {
                id: "music_aura",
                kind: "ambient",
                title: "Now playing",
                subtitle: "Midnight City",
                icon: "mdi:music-circle",
                frame: { x: 8, y: 4, w: 84, h: 64 },
                style: { accent: "#b76e79" },
                presentation: { surface: "naked", layer: "backdrop", align: "center", scale: "xl" },
                animation: { preset: "orbit", trigger: "always", speed: "slow", intensity: "subtle" },
              },
              {
                id: "track",
                kind: "hero_value",
                entity: "media_player.living_room",
                bind: { value: "attributes.media_title" },
                label: "M83",
                subtitle: "Living Room Speaker",
                icon: "mdi:music",
                frame: { x: 10, y: 18, w: 80, h: 28 },
                style: { accent: "#b76e79" },
                presentation: { surface: "naked", layer: "raised", align: "center", scale: "large" },
              },
              {
                id: "media_actions",
                kind: "button_group",
                buttons: [
                  {
                    label: "Play / Pause",
                    icon: "mdi:play-pause",
                    action: { type: "service", domain: "media_player", service: "media_play_pause", entity_id: "media_player.living_room" },
                  },
                  {
                    label: "Movie",
                    icon: "mdi:movie-open",
                    action: { type: "service", domain: "scene", service: "turn_on", entity_id: "scene.living_room_movie" },
                  },
                ],
                frame: { x: 10, y: 68, w: 80, h: 18 },
                style: { accent: "#b76e79" },
                presentation: { surface: "floating", layer: "overlay", align: "center" },
              },
            ],
          },
        });
      }

      function spatialSecurityCard() {
        return baseCard({
          intent: {
            goal: "security",
            title: "Perimeter Map",
            summary: "A spatial security surface that makes attention states visible without feeling like a table.",
            risk_level: "high",
            primary_entities: ["lock.front_door", "lock.garage_entry", "binary_sensor.garage_motion"],
            primary_actions: ["lock.lock", "lock.unlock"],
          },
          layout: {
            type: "canvas",
            aspect_ratio: "4/5",
            density: "comfortable",
            theme: "graphite",
            blocks: [
              {
                id: "security_field",
                kind: "ambient",
                title: "Perimeter",
                subtitle: "garage motion needs attention",
                icon: "mdi:shield-home",
                frame: { x: 7, y: 4, w: 86, h: 58 },
                style: { accent: "#c06c5a" },
                presentation: { surface: "naked", layer: "backdrop", align: "center", scale: "xl" },
                animation: { preset: "glow", trigger: "always", speed: "slow", intensity: "subtle" },
              },
