<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UrDash v2 Renderer Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #e9eeee;
        color: #162529;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.78), rgba(231,238,236,0.82)),
          #e9eeee;
      }

      header {
        max-width: 1440px;
        margin: 0 auto;
        padding: 28px 20px 18px;
      }

      header span {
        color: #177063;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 6px 0 8px;
        color: #132a2e;
        font-size: clamp(30px, 4vw, 52px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #5b6f72;
      }

      main {
        max-width: 1440px;
        display: grid;
        gap: 22px;
        margin: 0 auto;
        padding: 0 20px 32px;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .demo-grid > section {
        min-width: 0;
        display: grid;
        gap: 10px;
      }

      .demo-grid h2 {
        margin: 0;
        color: #20383c;
        font-size: 15px;
      }

      .wide {
        grid-column: 1 / -1;
      }

      ha-icon {
        display: inline-grid;
        place-items: center;
        width: 1.2em;
        height: 1.2em;
      }

      @media (max-width: 900px) {
        .demo-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <span>UrDash v2 local demo</span>
      <h1>Renderer sample cards</h1>
      <p>Static page with mocked Home Assistant state. No Home Assistant instance is required.</p>
    </header>

    <main>
      <div class="demo-grid" id="cards"></div>
    </main>

    <script type="module">

        static get observedAttributes() {
          return ["icon"];
        }

        constructor() {
          super();
          this.attachShadow({ mode: "open" });
        }

        connectedCallback() {
          this.render();
        }

        attributeChangedCallback() {
          this.render();
        }

        render() {
          const icon = this.getAttribute("icon") || "mdi:circle";
          this.title = icon;
          this.shadowRoot.innerHTML = `
            <style>
              :host {
                display: inline-grid;
                place-items: center;
                width: 1em;
                height: 1em;
              }
              span {
                display: block;
                width: 0.72em;
                height: 0.72em;
                border: 2px solid currentColor;
                border-radius: 999px;
                opacity: 0.86;
              }
            </style>
            <span></span>
          `;
        }
      }

      if (!customElements.get("ha-icon")) {
        customElements.define("ha-icon", DemoHaIcon);
      }

      await import("../../custom_components/urdash/frontend/urdash-custom-card.js?v=20260711.10");

          "sensor.home_battery": state("sensor.home_battery", "78", "Home Battery", { unit_of_measurement: "%" }),

          "fan.air_purifier": state("fan.air_purifier", "on", "Air Purifier"),
          "fan.bedroom_breeze": state("fan.bedroom_breeze", "on", "Bedroom Breeze", {
            supported_features: 63,
            percentage: 65,
            percentage_step: 5,
            preset_mode: "auto",
            preset_modes: ["auto", "sleep", "breeze", "turbo"],
            oscillating: true,
            direction: "forward",
          }),
          "switch.washer": state("switch.washer", "on", "Washer"),
          "sensor.washer_remaining": state("sensor.washer_remaining", "24", "Washer Remaining", { unit_of_measurement: "min" }),
          "sensor.washer_power": state("sensor.washer_power", "342", "Washer Power", { unit_of_measurement: "W" }),
          "switch.irrigation_front": state("switch.irrigation_front", "off", "Front Irrigation"),
          "switch.irrigation_back": state("switch.irrigation_back", "on", "Back Irrigation"),
          "sensor.soil_moisture_front": state("sensor.soil_moisture_front", "42", "Front Soil Moisture", { unit_of_measurement: "%" }),
          "sensor.soil_moisture_back": state("sensor.soil_moisture_back", "68", "Back Soil Moisture", { unit_of_measurement: "%" }),
          "scene.living_room_movie": state("scene.living_room_movie", "scening", "Movie Mode"),
          "scene.home_goodnight": state("scene.home_goodnight", "scening", "Good Night"),
          "scene.home_focus": state("scene.home_focus", "scening", "Focus Mode"),
          "scene.home_morning": state("scene.home_morning", "scening", "Morning Mode"),
          "media_player.living_room": state("media_player.living_room", "playing", "Living Room Speaker", {
            supported_features: 383423,
            media_title: "Midnight City",
            media_artist: "M83",
            media_duration: 244,
            media_position: 86,
            volume_level: 0.34,
            is_volume_muted: false,
            source: "Music",
            source_list: ["Music", "TV", "Radio"],
            sound_mode: "Stereo",
            sound_mode_list: ["Stereo", "Movie", "Night"],
            shuffle: false,
            repeat: "off",
          }),
        },
        connection: {
          subscribeMessage(callback, request) {
            if (request.type === "weather/subscribe_forecast" && request.entity_id === "weather.home") {
              queueMicrotask(() => callback({
                type: request.forecast_type,
                forecast: [
                  { datetime: "2026-07-11T04:00:00+08:00", condition: "partlycloudy", temperature: 31, templow: 25, precipitation_probability: 20 },
                  { datetime: "2026-07-12T04:00:00+08:00", condition: "sunny", temperature: 33, templow: 26, precipitation_probability: 10 },
                  { datetime: "2026-07-13T04:00:00+08:00", condition: "rainy", temperature: 29, templow: 24, precipitation_probability: 70 },
                  { datetime: "2026-07-14T04:00:00+08:00", condition: "lightning-rainy", temperature: 28, templow: 23, precipitation_probability: 85 },
                  { datetime: "2026-07-15T04:00:00+08:00", condition: "cloudy", temperature: 30, templow: 24, precipitation_probability: 35 },
                ],
              }));
            }
            return Promise.resolve(() => {});
          },
        },
        callService(domain, service, data) {
          window.demoServiceCalls ||= [];
          window.demoServiceCalls.push({ domain, service, data });
          console.log("mock callService", { domain, service, data });
        },
      };

      const samples = [
        {
          title: "Capability-driven Light Studio",
          config: adaptiveBubbleControlCard(),
        },
        {
          title: "Capability-driven Climate Studio",
          config: capabilityClimateCard(),
        },
        {
          title: "Capability-driven Fan Studio",
          config: capabilityFanCard(),
        },
        {
          title: "Capability-driven Cover Studio",
          config: capabilityCoverCard(),
        },

          config: capabilityMediaCard(),

        {
          title: "Live Weather Forecast",
          className: "wide",
          config: liveWeatherForecastCard(),
        },
        {
          title: "Expression Energy Balance",
          config: expressionEnergyCard(),
        },
        {
          title: "Xyris Hero Orb",
          config: xyrisHeroOrbCard(),
        },
        {
          title: "Aurora Weather Orb",
          config: xyrisWeatherOrbCard(),
        },
        {
          title: "Minimal Weather",
          config: minimalWeatherCard(),
        },
        {
          title: "Fancy Scene Composition",
          className: "wide",
          config: fancySceneCard(),
        },
        {
          title: "Visual Map Orbit",
          className: "wide",
          config: visualMapOrbitCard(),
        },
        {

          className: "wide",
          config: roomControlCard(),
        },
        {

          config: weatherLensCard(),

          className: "wide",
          config: auroraForecastCard(),
        },
        {
          title: "Weather Glyph",
          config: vectorIconLabCard(),
        },
        {
          title: "Energy Cockpit",
          config: energyCockpitCard(),
        },
        {
          title: "Media Mood",
          config: mediaMoodCard(),
        },
        {
          title: "Spatial Security Map",
          config: spatialSecurityCard(),
        },
        {
          title: "Wellness Halo",
          config: wellnessHaloCard(),
        },
        {
          title: "Laundry Cockpit",
          config: laundryCockpitCard(),
        },
        {

          config: gardenFlowCard(),
        },
        {
          title: "Cinematic Weather",
          className: "wide",
          config: cinematicWeatherCard(),
        },
        {
          title: "Whole Home Command",
          className: "wide",
          config: wholeHomeCommandCard(),
        },
        {
          title: "Minimal Sensor Strip",
          config: minimalSensorStripCard(),
        },
        {
          title: "Quiet Climate",
          config: climateCard(),
        },
        {
          title: "Security Snapshot",
          config: securityCard(),
        },
        {
          title: "Weather And Energy",
          className: "wide",
          config: weatherEnergyCard(),
        },
      ];

      const host = document.querySelector("#cards");
      for (const sample of samples) {
        const section = document.createElement("section");
        if (sample.className) section.className = sample.className;
        const title = document.createElement("h2");
        title.textContent = sample.title;
        const card = document.createElement("urdash-card");
        card.setConfig({ ...sample.config, preview: true });
        card.hass = hass;
        section.append(title, card);
        host.appendChild(section);
      }

      function state(entityId, value, friendlyName, attributes = {}) {
        return {
          entity_id: entityId,
          state: value,
          attributes: {
            friendly_name: friendlyName,
            ...attributes,
          },
          last_changed: new Date(Date.now() - 1000 * 60 * 8).toISOString(),
          last_updated: new Date().toISOString(),
        };
      }

      function baseCard({ heightMode = "auto", assets, dataSources, intent, layout }) {
        return {
          type: "custom:urdash-card",
          urdash_schema: 2,
          height_mode: heightMode,
          card: {
            ...(assets ? { assets } : {}),
            ...(dataSources ? { data_sources: dataSources } : {}),
            intent,
            layout,
          },
        };
      }

      function expressionEnergyCard() {
        const solar = { op: "entity", entity_id: "sensor.solar_power", path: "state" };
        const load = { op: "entity", entity_id: "sensor.home_power", path: "state" };
        const selfPowered = {
          op: "round",
          args: [{ op: "percentage", args: [solar, load] }],
          decimals: 0,
        };
        return baseCard({
          intent: {
            goal: "energy",
            title: "Live Energy Balance",
            summary: "Derived values and adaptive presentation from multiple Home Assistant entities.",
            risk_level: "low",
            primary_entities: ["sensor.solar_power", "sensor.home_power", "sensor.home_battery"],
            primary_actions: [],
          },
          layout: {
            type: "grid",
            columns: 12,
            density: "comfortable",
            theme: "graphite",
            blocks: [
              {
                id: "energy-ratio",
                kind: "hero_value",
                title: {
                  op: "map",
                  args: [{ op: "gt", args: [selfPowered, { op: "literal", value: 50 }] }],
                  cases: [{ when: true, value: { op: "literal", value: "Solar is carrying the home" } }],
                  default: { op: "literal", value: "Grid support is active" },
                },
                label: "self powered",
                entity: "sensor.solar_power",
                bind: { value: selfPowered, unit: { op: "literal", value: "%" } },
                icon: {
                  op: "if",
                  condition: { op: "gt", args: [selfPowered, { op: "literal", value: 50 }] },
                  then: { op: "literal", value: "mdi:solar-power" },
                  else: { op: "literal", value: "mdi:transmission-tower" },
                },
                style: {
                  accent: {
                    op: "if",
                    condition: { op: "gt", args: [selfPowered, { op: "literal", value: 50 }] },
                    then: { op: "literal", value: "#35d39a" },
                    else: { op: "literal", value: "#f4b860" },
                  },
                  emphasis: "hero",
                },
                animation: { preset: "glow", trigger: "always", speed: "slow", intensity: "subtle", active: { op: "gt", args: [solar, { op: "literal", value: 0 }] } },
                grid: { col: 1, row: 1, w: 12, h: 3 },
              },
              {
                id: "net-demand",
                kind: "value",
                label: "Net demand",
                entity: "sensor.home_power",
                bind: {
                  value: { op: "subtract", args: [load, solar] },
                  unit: { op: "literal", value: " W" },
                },
                grid: { col: 1, row: 4, w: 6, h: 2 },
              },
              {
                id: "battery",
                kind: "value",
                label: "Battery reserve",
                entity: "sensor.home_battery",
                bind: { value: "state", unit: "attributes.unit_of_measurement" },
                visibility: { expression: { op: "gt", args: [{ op: "entity", entity_id: "sensor.home_battery", path: "state" }, { op: "literal", value: 0 }] } },
                grid: { col: 7, row: 4, w: 6, h: 2 },
              },
            ],
          },
        });
      }

      function liveWeatherForecastCard() {
        const source = (index, field) => ({ op: "source", source_id: "home_daily", path: `forecast.${index}.${field}` });
        const literal = (value) => ({ op: "literal", value });
        const conditionIconRef = (condition) => ({ set: "aurora_weather", key: condition });
        const weatherIconSet = {
          id: "aurora_weather",
          variants: [
            { key: "sunny", vector_icon: weatherVectorIcon("sun", "#ffb703") },
            { key: "partlycloudy", vector_icon: weatherVectorIcon("partly", "#70b7c9") },
            { key: "cloudy", vector_icon: weatherVectorIcon("cloud", "#91a7b0") },
            { key: "rainy", vector_icon: weatherVectorIcon("rain", "#4f9fc4") },
            { key: "pouring", vector_icon: weatherVectorIcon("rain", "#327ea5") },
            { key: "clear-night", icon: "mdi:weather-night" },
            { key: "lightning", icon: "mdi:weather-lightning" },
            { key: "lightning-rainy", icon: "mdi:weather-lightning-rainy" },
            { key: "fog", icon: "mdi:weather-fog" },
            { key: "hail", icon: "mdi:weather-hail" },
            { key: "snowy", icon: "mdi:weather-snowy" },
            { key: "snowy-rainy", icon: "mdi:weather-snowy-rainy" },
            { key: "windy", icon: "mdi:weather-windy" },
            { key: "windy-variant", icon: "mdi:weather-windy-variant" },
          ],
          fallback: { icon: "mdi:weather-cloudy-alert" },
        };
        const forecastBlocks = Array.from({ length: 5 }, (_, index) => ({
          id: `live-day-${index}`,
          kind: "value",
          title: {
            op: "format_datetime",
            args: [source(index, "datetime")],
            style: "weekday_short",
            locale: "en-US",
          },
          icon_ref: conditionIconRef(source(index, "condition")),
          entity: "weather.home",
          bind: {
            value: {
              op: "concat",
              args: [
                { op: "format_number", args: [source(index, "temperature")], decimals: 0 },
                literal("° / "),
                { op: "format_number", args: [source(index, "templow")], decimals: 0 },
                literal("°"),
              ],
            },
            unit: literal(""),
          },
          label: {
            op: "concat",
            args: [literal("Rain "), source(index, "precipitation_probability"), literal("%")],
          },
          grid: { col: index * 2 + 1, row: 4, w: 2, h: 2 },
          style: { tone: "cool", shape: "soft", accent: "#58a6a6" },
          presentation: { surface: "ghost", layer: "base", align: "center", scale: "small" },
        }));
        return baseCard({
          assets: { icon_sets: [weatherIconSet] },
          dataSources: [{ id: "home_daily", type: "weather_forecast", entity: "weather.home", forecast_type: "daily", limit: 5 }],
          intent: {
            goal: "weather",
            title: "Taipei Sky",
            summary: "Live current conditions and a five-day forecast subscribed directly from weather.home.",
            risk_level: "low",
            primary_entities: ["weather.home"],
            primary_actions: [],
          },
          layout: {
            type: "grid",
            columns: 10,
            density: "comfortable",
            theme: "calm",
            blocks: [
              {
                id: "live-current",
                kind: "hero_value",
                entity: "weather.home",
                bind: { value: "attributes.temperature", unit: "attributes.temperature_unit" },
                label: { op: "entity", entity_id: "weather.home", path: "state" },
                icon_ref: conditionIconRef({ op: "entity", entity_id: "weather.home", path: "state" }),
                grid: { col: 1, row: 1, w: 10, h: 3 },
                style: { accent: "#2c8c99", emphasis: "hero", shape: "soft" },
                presentation: { surface: "hero", layer: "raised", align: "center", scale: "xl" },
                animation: { preset: "breathe", trigger: "always", speed: "slow", intensity: "subtle" },
                action: { type: "more_info", entity_id: "weather.home" },
              },
              ...forecastBlocks,
            ],
          },
        });
      }

      function adaptiveBubbleControlCard() {
        const lightState = { op: "entity", entity_id: "light.living_room_main", path: "state" };
        const brightness = {
          op: "round",
          decimals: 0,
          args: [{
            op: "percentage",
            args: [
              { op: "entity", entity_id: "light.living_room_main", path: "attributes.brightness" },
              { op: "literal", value: 255 },
